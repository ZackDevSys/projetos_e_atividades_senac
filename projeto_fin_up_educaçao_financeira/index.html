<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinUp | Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>

    <div class="glow-blue"></div>
    <div class="glow-orange"></div>

    <div class="login-wrapper">
        <div class="login-left">
            <h1>Bem-vindo ao <span>Fin</span><span>Up</span></h1>
            <p>Dê um UP na sua vida financeira.</p>
            <img src="img/porquinho_fin_png.png">
        </div>

        <div class="container">
            <div class="logo">
                <span>Fin</span><span>Up</span>
            </div>

            <div class="input-group">
                <input type="email" placeholder="Email">
            </div>

            <div class="input-group">
                <input type="password" placeholder="Senha">
            </div>

            <div class="remember">
                <div class="checkbox">
                    <input type="checkbox"> Lembrar senha
                </div>
                <div class="forgot-password">
                    <a href="#">Esqueceu a senha?</a>
                </div>
            </div>

            <button class="btn-primary">Entrar na Plataforma</button>

            <p class="register">Não tem uma conta?<a href="#">Cadastrar</a></p>

            <div class="footer">
                © 2026 FinUp - Educação Financeira Inteligente
            </div>
        </div>
    </div>

</body>

<script src="script.js"></script>

</html>
